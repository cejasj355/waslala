{% extends 'polls/base.html' %}
{% block title %}{% endblock %}

{% block content %}
<div class="container mt-5 mb-5">
    <div class="row g-5">
        <!-- Resumen de la compra (Se ve primero en móviles) -->
        <div class="col-md-5 col-lg-4 order-md-last">
            <h4 class="d-flex justify-content-between align-items-center mb-3">
                <span class="text-primary">Tu pedido</span>
                <span class="badge bg-primary rounded-pill">3</span>
            </h4>
            <ul class="list-group mb-3">
                <li class="list-group-item d-flex justify-content-between lh-sm">
                    <div>
                        <h6 class="my-0">Remera Waslala</h6>
                        <small class="text-muted">Talle M</small>
                    </div>
                    <span class="text-muted">$12.000</span>
                </li>
                <li class="list-group-item d-flex justify-content-between bg-light">
                    <div class="text-success">
                        <h6 class="my-0">Envío</h6>
                        <small>Córdoba Capital</small>
                    </div>
                    <span class="text-success">Gratis</span>
                </li>
                <li class="list-group-item d-flex justify-content-between">
                    <span>Total (ARS)</span>
                    <strong>$12.000</strong>
                </li>
            </ul>
        </div>

        <!-- Formulario de Datos -->
        <div class="col-md-7 col-lg-8">
            <h4 class="mb-3">Datos de Entrega</h4>
            <form action="" method="POST">
                {% csrf_token %}
                <div class="row g-3">
                    <div class="col-sm-6">
                        <label class="form-label">Nombre</label>
                        <input type="text" class="form-control" required>
                    </div>
                    <div class="col-sm-6">
                        <label class="form-label">Apellido</label>
                        <input type="text" class="form-control" required>
                    </div>
                    <div class="col-12">
                        <label class="form-label">WhatsApp <span class="text-muted">(Para coordinar envío)</span></label>
                        <input type="tel" class="form-control" placeholder="351..." required>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Dirección / Localidad</label>
                        <input type="text" class="form-control" placeholder="Calle Falsa 123, B° Centro" required>
                    </div>
                </div>

                <hr class="my-4">

                <h4 class="mb-3">Método de Pago</h4>
                <div class="my-3">
                    <div class="form-check">
                        <input id="transfer" name="paymentMethod" type="radio" class="form-check-input" checked required>
                        <label class="form-check-label" for="transfer">Transferencia / Mercado Pago</label>
                    </div>
                    <div class="form-check">
                        <input id="efectivo" name="paymentMethod" type="radio" class="form-check-input" required>
                        <label class="form-check-label" for="efectivo">Efectivo al retirar</label>
                    </div>
                </div>

                <button class="w-100 btn btn-primary btn-lg mt-4" type="submit">Finalizar Compra</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
